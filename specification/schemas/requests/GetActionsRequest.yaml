type: object
description: "Specifies the criteria for querying Action objects. If all optional filters are omitted, the query runs against the entire corpus of actions."
properties:
  itemIds:
    type: array
    items:
      $ref: '../core/ID.yaml'
    description: "Optional. A list of Item IDs. Returns actions that affected any of these items."

  producesVersionIds:
    type: array
    items:
      $ref: '../core/ID.yaml'
    description: "Optional. A list of Version IDs. Returns actions that produced any of these versions."

  actionTypes:
    type: array
    items:
      type: string
      enum:
        - Amendment
        - Revocation
        - Creation
        - Repeal
    description: "Optional. Filters actions to only those of the specified types."

  granularity:
    type: string
    enum:
      - macro
      - micro
    description: >-
      Optional. Filters Actions by hierarchical granularity level.
      - 'macro': Returns only top-level macro-events (parentId = null).
      - 'micro': Returns only atomic micro-events (parentId != null).
      - If omitted, returns both macro and micro-events.

  timeInterval:
    type: object
    description: "Optional but recommended. Filters actions by their effective date. At least one of 'startTime' or 'endTime' should be provided."
    properties:
      startTime:
        type: string
        format: date-time
        description: "Optional. Includes actions with eventTime >= startTime."
      endTime:
        type: string
        format: date-time
        description: "Optional. Includes actions with eventTime <= endTime."

  dataSources:
    $ref: '../common/DataSourcesSchema.yaml'
    description: "Optional. Restricts results to specified data sources."
