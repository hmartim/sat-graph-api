type: object
description: "Specifies the criteria for querying Relation objects. If 'entityId' is omitted, the query runs against the entire corpus of relations."
properties:
  entityId:
    $ref: '../core/ID.yaml'
    description: "Optional. The ID of an anchor entity. If provided, 'entityType' is required."
  entityType:
    type: string
    description: "Optional. The type of the anchor entity. Required only if 'entityId' is provided."
    enum: [ "Item", "Version" ]
  predicate:
    type: string
    description: "Optional. Filters relations by a specific predicate (e.g., 'cites')."
  direction:
    type: string
    description: "Specifies the direction of the relations to retrieve relative to the 'entityId'."
    enum: [ "forward", "backward", "both" ]
    default: "both"
  validityIntervalFilter:
    type: object
    description: "Optional. Filters relations to those whose validity interval overlaps with the specified interval."
    properties:
      startTime:
        type: string
        format: date-time
      endTime:
        type: string
        format: date-time
  metadataFilter:
    type: object
    additionalProperties: true
    description: "Optional. Key-value pairs to filter against the 'metadata' of the Relation."
  dataSources:
    $ref: '../common/DataSourcesSchema.yaml'
