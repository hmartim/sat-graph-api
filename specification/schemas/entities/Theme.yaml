#
# OpenAPI 3.x Schema for the 'Theme' Data Model
#
# This file defines the schema for the 'Theme' object, which represents an
# atemporal, conceptual entity used to classify 'Item's and to organize
# knowledge within the SAT-Graph. Themes can be arranged in their own
# taxonomy via parent-child relationships.
#
type: object
description: >
  Represents an atemporal, conceptual entity used to classify Items and organize
  knowledge. Themes form a taxonomy (e.g., "Social Security" is a child of
  "Public Law") and serve as entry points for curated, topic-based searches.
required:
  - id
  - label
properties:
  id:
    $ref: '../core/ID.yaml'
    description: >-
      The primary, opaque identifier for this Theme. The field is a string with no
      format restriction, allowing each implementation to choose the most appropriate
      strategy: UUIDs for distributed systems, deterministic hashes, or semantic
      identifiers. In the examples of this specification, the id field may be populated
      with a semantic identifier to facilitate reading.
  urn:
    type: string
    nullable: true
    description: >-
      The persistent semantic identifier in URN format for this Theme. Represents
      the ontological identity of this thematic classification, serving as the key
      for interoperability, ontology mapping, and semantic web integration.
    minLength: 1
    example: "urn:lex:br:federal:tema:previdencia-social"
  url:
    type: string
    format: uri
    nullable: true
    description: >-
      The canonical electronic address (Dereferenceable URI) pointing to the official
      definition or documentation of this Theme. This field is used for human reference
      and external system integration.
    minLength: 1
    example: "https://normas.leg.br/temas/previdencia-social"
  label:
    type: string
    description: "The human-readable name or label for the theme."
    example: "Social Security"
  parentIds:
    type: array
    nullable: true
    description: >-
      An optional list of IDs of broader themes in the taxonomy. A theme can have
      multiple parents to support poly-hierarchical classification.
    items:
      $ref: '../core/ID.yaml'
    example:
      - "urn:lex:br:federal:tema:direito.publico"
  childrenIds:
    type: array
    nullable: true
    description: "An optional list of IDs of more specific themes in the taxonomy."
    items:
      $ref: '../core/ID.yaml'
    example:
      - "urn:lex:br:federal:tema:pensoes"
      - "urn:lex:br:federal:tema:saude"
  metadata:
    $ref: '../core/JSON.yaml'
    nullable: true
    description: >-
      A flexible field for any valid JSON data. Used for storing structured
      properties of the theme, such as scope, domain-specific attributes, or
      additional classification information that doesn't fit into other fields.


      **Best Practice:** Use schema.org vocabularies (e.g., schema.org/DefinedTerm)
      to enable semantic interoperability. See [Metadata Best Practices](../../docs/METADATA_BEST_PRACTICES.md)
      for guidance on structuring thematic metadata.

