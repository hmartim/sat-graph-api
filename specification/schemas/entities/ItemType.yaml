#
# OpenAPI 3.x Schema for the 'ItemType' Data Model
#
# This file defines the schema for the 'ItemType' object, which represents a
# classification type within the SAT-Graph taxonomy. ItemTypes form a poly-hierarchical
# taxonomy (e.g., "Article" is a child of "Component") and serve as a formal type system for Items.
#
type: object
description: >
  Represents a classification type in the Item taxonomy. ItemTypes form a poly-hierarchical
  structure that defines the formal type system for Items. For example, in the legal domain,
  "Article" is a type of "Component" and can contain "Caput" and "Paragraph".

  ItemTypes enable:
  - Validation of Item hierarchies (e.g., an Article can only contain Paragraphs)
  - Rich metadata about types (icons, levels, constraints)
  - Multilingual descriptions via associated TextUnits (using aspects like 'description', 'summary')
  - Discovery and navigation of the type system

  **Usage Across Domains:**

  While originally designed for legislative structure (Articles, Paragraphs, etc.),
  ItemTypes also support judicial and case law modeling:

  - **Legislative Types**: Constitution, Law, Article, Paragraph, Inciso, Alinea
  - **Judicial Types**: Judgment, Overruling, Distinguishing, Constitutional Mutation
  - **Judgment Components**: Voto do Relator, Ementa, Relatório, Dispositivo
  - **Common Law Types**: Opinion, Majority Opinion, Dissenting Opinion, Concurring Opinion

  This allows a unified taxonomic approach across both statutory text and judicial precedents.
required:
  - id
  - label
properties:
  id:
    $ref: '../core/ID.yaml'
    description: >-
      The primary, opaque identifier for this ItemType. The field is a string with no
      format restriction, allowing each implementation to choose the most appropriate
      strategy: UUIDs for distributed systems, deterministic hashes, or semantic
      identifiers. In the examples of this specification, the id field is populated
      with a semantic identifier (e.g., "article") to facilitate reading.
    example: "article"
  urn:
    type: string
    nullable: true
    description: >-
      The persistent semantic identifier in URN format for this ItemType. Represents
      the ontological identity of this type classification, serving as the key for
      interoperability and semantic web integration.
    minLength: 1
    example: "urn:lex:br:federal:tipo-dispositivo:artigo"
  url:
    type: string
    format: uri
    nullable: true
    description: >-
      The canonical electronic address (Dereferenceable URI) pointing to the official
      definition or documentation of this ItemType. This field is used for human
      reference and external system integration.
    minLength: 1
    example: "https://normas.leg.br/?urn=urn:lex:br:federal:tipo-dispositivo:artigo"
  label:
    type: string
    description: "The human-readable name or label for this type."
    minLength: 1
    example: "Article"
  parentIds:
    type: array
    nullable: true
    description: >-
      An optional list of IDs of broader types in the taxonomy. An ItemType can have
      multiple parents to support poly-hierarchical classification (e.g., "Legal Provision"
      might be both a "Work Concept" and a "Normative Content").
    items:
      $ref: '../core/ID.yaml'
    example:
      - "component"
  childrenIds:
    type: array
    nullable: true
    description: >-
      An optional list of IDs of more specific types in the taxonomy (Is-A hierarchy).
      Represents specialization relationships.
    items:
      $ref: '../core/ID.yaml'
  allowedPartsIds:
    type: array
    nullable: true
    description: >-
      An optional list of IDs of ItemTypes that are allowed as structural parts
      within instances of this ItemType. This defines composition rules (Allowed-Part-Of dimension),
      separate from taxonomic relationships. For example, "Article" might allow "Caput" and "Paragraph"
      as parts, but not "Chapter" or "Section".
    items:
      $ref: '../core/ID.yaml'
    example:
      - "paragraph"
      - "inciso"
      - "alinea"
  metadata:
    $ref: '../core/JSON.yaml'
    nullable: true
    description: >-
      A flexible field for any valid JSON data. Used for storing type-specific properties
      such as validation rules, UI hints, structural constraints, or other domain-specific
      attributes.

      Examples:
      - Validation rules: which types can contain which other types
      - UI hints: icons, colors, display order
      - Structural constraints: max depth, numbering schemes
      - Legal semantics: normative weight, citation formats
    example:
      level: 2
      icon: "📄"
