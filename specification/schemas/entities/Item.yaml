#
# OpenAPI 3.x Schema for the 'Item' Data Model
#
# This file defines the schema for the 'Item' object, which represents a timeless,
# structural entity within the SAT-Graph. An 'Item' is the abstract representation
# of a document (like a legal norm) or one of its hierarchical components.
# In the SAT-Graph ontology, it corresponds to the 'Work' or 'Component Work' concepts.
#
# It is intentionally atemporal and does not contain textual content itself; that
# is handled by the 'Version' and 'TextUnit' models.
#

type: object
description: >
  Represents a timeless, foundational entity within the SAT Graph. An 'Item'
  acts as a stable, version-agnostic anchor for a specific concept.

  While its primary role is to model the formal structure of a document (as a 'Work' or
  'Work Component'), it is flexible enough to represent other key entities, such as:
  - **Abstract Concepts:** A legal or procedural concept (e.g., 'Revocation', 'Due Process').
  - **Named Entities:** A real-world entity like an organization or location (e.g., 'National Congress').

  The 'Item' itself is just a structural and conceptual anchor. Its semantic meaning and
  textual content are provided by associated 'TextUnit' objects, typically with an
  aspect like 'description', 'summary'.
required:
  - id
  - typeId
  - label
properties:
  id:
    $ref: '../core/ID.yaml'
    description: >-
      The primary, opaque identifier for this Item. The field is a string with no
      format restriction, allowing each implementation to choose the most appropriate
      strategy: UUIDs for distributed systems, deterministic hashes, or even the URN
      itself for simplified implementations. In the examples of this specification,
      the id field is populated with the URN to facilitate reading and manual tracing
      of relationships in JSON objects.
  urn:
    type: string
    nullable: true
    description: >-
      The persistent semantic identifier in the URN LEX standard
      (e.g., urn:lex:br:federal:constituicao:1988-10-05;art5). Represents the
      ontological identity of the norm, independent of its location or implementation,
      serving as the key for deduplication and interoperability between systems.
    minLength: 1
    example: "urn:lex:br:federal:constituicao:1988-10-05;1988!art5"
  url:
    type: string
    format: uri
    nullable: true
    description: >-
      The canonical electronic address (Dereferenceable URI) pointing to the official
      source of the text (e.g., Portal do Planalto or LexML). This field is used
      exclusively for human user interface (access provenance), not for logical
      inferences by the agent.
    minLength: 1
    example: "https://normas.leg.br/?urn=urn:lex:br:federal:constituicao:1988-10-05;1988!art5"
  typeId:
    $ref: '../core/ID.yaml'
    description: >-
      The unique identifier of the ItemType that classifies this item. This references
      an ItemType entity that defines the formal type within the taxonomy (e.g.,
      "Constitution", "Article", "Paragraph").

      The ItemType taxonomy enables validation, navigation, and rich metadata about
      type relationships and constraints.
    example: "article"
  label:
    type: string
    description: "The human-readable label or title for the item."
    minLength: 1
    example: "Brazilian Constitution of 1988"
  parentId:
    $ref: '../core/ID.yaml'
    nullable: true
    description: >-
      The canonical ID of the single structural parent of this item. This field is
      primarily relevant for 'Concept Component' items to define the document hierarchy.
      For other categories like 'Abstract Concept', it may be used to build a taxonomy.
  metadata:
    $ref: '../core/JSON.yaml'
    nullable: true
    description: >-
      A flexible field for any valid JSON data. Used for storing structured,
      atemporal properties of the item, such as jurisdiction, publication data,
      or other domain-specific attributes that don't fit into the other fields.


      **Best Practice:** Use internationally recognized vocabularies such as schema.org
      (particularly schema.org/Legislation for legal norms) to enable semantic interoperability
      and zero-shot understanding by AI agents. See [Metadata Best Practices](../../docs/METADATA_BEST_PRACTICES.md)
      for detailed guidance and examples.


      This approach is exemplified in:
      [Legal Knowledge Graph Foundations, Part-I: URI-Addressable Abstract Works (LRMoo F1 to schema.org)](https://arxiv.org/abs/2508.00827).